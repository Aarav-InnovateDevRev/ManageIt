<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManageIt - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body{background:#fdf6e3;}.card{border-radius:15px;}</style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-brown"><div class="container"><a class="navbar-brand fw-bold" href="/">📦 ManageIt</a><a href="{{url_for('logout')}}" class="btn btn-outline-light">Logout</a></div></nav>
<div class="container py-5">
    <h2 class="text-center mb-5">Welcome back, {{session.username}}!</h2>
    <div class="row g-4">
        <div class="col-md-4"><a href="/tasks" class="text-decoration-none"><div class="card text-center p-4"><i class="fas fa-list fa-3x mb-3 text-brown"></i><h4>Tasks</h4><h2>{{tasks_count}}</h2></div></a></div>
        <a href="/ai-chat" class="btn btn-primary btn-lg w-100 mt-3">
    <i class="fas fa-robot"></i> Talk to AI Business Assistant
    </a>
        <div class="col-md-4"><a href="/orders" class="text-decoration-none"><div class="card text-center p-4"><i class="fas fa-receipt fa-3x mb-3 text-brown"></i><h4>Orders</h4><h2>₹{{total_revenue|round(0)}}</h2></div></a></div>
        <div class="col-md-4"><div class="card text-center p-4"><i class="fas fa-chart-line fa-3x mb-3 text-brown"></i><h4>Ready to grow?</h4><a href="/orders" class="btn btn-primary">Add Order</a></div></div>
    </div>
</div>
</body>
</html>
