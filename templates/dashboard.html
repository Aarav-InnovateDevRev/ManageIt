<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManageIt - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: linear-gradient(to bottom, #fdf6e3, #f5e8c7); }
        .navbar { background-color: #5d4037 !important; }
        .navbar-brand, .nav-link { color: white !important; }
        .card { background: #fffaf0; border-radius: 16px; box-shadow: 0 8px 25px rgba(139,69,19,0.15); }
        .btn-primary { background-color: #8d5524; border: none; }
        .btn-primary:hover { background-color: #6b3d1a; }
        .ai-tip { background: #fffaf0; border-left: 5px solid #8d5524; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard">📦 ManageIt</a>
            <div class="ms-auto">
                <a href="/logout" class="btn btn-outline-light">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="text-center mb-5">Welcome back, {{ username }}!</h2>
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <i class="fas fa-list fa-3x mb-3 text-brown"></i>
                    <h4>Tasks</h4>
                    <p class="display-6">{{ tasks_count }}</p>
                    <a href="/tasks" class="btn btn-outline-primary w-100">Manage Tasks</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <i class="fas fa-receipt fa-3x mb-3 text-brown"></i>
                    <h4>Revenue</h4>
                    <p class="display-6">₹{{ total_revenue|round(0) }}</p>
                    <a href="/orders" class="btn btn-outline-primary w-100">Manage Orders</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <i class="fas fa-robot fa-3x mb-3 text-brown"></i>
                    <h4>AI Assistant</h4>
                    <a href="/ai-chat" class="btn btn-primary w-100">Talk to AI</a>
                </div>
            </div>
        </div>

        <!-- AI Habit Tip -->
        <div class="card p-4 mt-4 ai-tip">
            <h5><i class="fas fa-lightbulb text-warning"></i> AI Business Insight</h5>
            <p class="text-muted">{{ ai_tip | safe }}</p>
        </div>
    </div>
</body>
</html>
