<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManageIt - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex align-items-center min-vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-5">
                <h2 class="text-center mb-4"><i class="fas fa-box"></i> ManageIt</h2>
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for cat, msg in messages %}<div class="alert alert-{{cat}}">{{msg}}</div>{% endfor %}
                    {% endif %}
                {% endwith %}
                <form method="POST">
                    <div class="mb-3"><input type="text" name="username" class="form-control form-control-lg" placeholder="Username" required></div>
                    <div class="mb-4"><input type="password" name="password" class="form-control form-control-lg" placeholder="Password" required></div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Create Account</button>
                </form>
                <p class="text-center mt-3">Already have account? <a href="{{url_for('login')}}">Login</a></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
