<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManageIt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(to bottom, #fdf6e3, #f5e8c7); text-align: center; padding-top: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="display-1 text-muted">404</h1>
        <h3>Page Not Found</h3>
        <p>Redirecting you to the right place...</p>
        
        <script>
            // Auto redirect logic
            setTimeout(function() {
                // Check if user is logged in by looking for a common logged-in element or session
                // Since we can't directly check Flask session from JS, we redirect to a smart route
                window.location.href = "/smart-redirect";
            }, 800); // 0.8 seconds - fast and smooth
        </script>
    </div>
</body>
</html>
