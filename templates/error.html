<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - ManageIt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#fdf6e3; font-family: 'Segoe UI'; }
        .error-card { border-radius:20px; box-shadow:0 15px 50px rgba(139,69,19,0.3); }
        pre { background:#f8f1e3; padding:20px; border-radius:12px; overflow:auto; font-size:0.9rem; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="error-card bg-white p-5 text-center">
                <h1 class="display-1 mb-0">😓</h1>
                <h2 class="mt-3">Oops! Something went wrong</h2>
                <p class="lead">{{error}}</p>
                {% if traceback %}
                <h5 class="mt-5 text-start">🔍 Debug Info (only visible in development):</h5>
                <pre class="text-start">{{traceback}}</pre>
                {% endif %}
                <a href="/dashboard" class="btn btn-primary btn-lg mt-4">Go Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
