<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManageIt - AI Assistant 🤖</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: linear-gradient(to bottom, #fdf6e3, #f5e8c7); }
        #chat-box { max-height: 60vh; overflow-y: auto; margin-bottom: 1rem; padding: 1rem; border: 1px solid #d7b99f; border-radius: 12px; background: white; }
        .msg { margin: 10px 0; padding: 12px; border-radius: 15px; max-width: 80%; }
        .user-msg { background: #8d5524; color: white; margin-left: auto; }
        .ai-msg { background: #fffaf0; border: 1px solid #d7b99f; margin-right: auto; }
    </style>
</head>
<body class="container py-5">
    <h2 class="text-center mb-4">🤖 AI Business Assistant</h2>
    
    <div id="chat-box">
        <div class="msg ai-msg">Hi! I'm your AI helper. Ask me anything about your printing business, tasks, orders, or growth ideas 😊</div>
    </div>

    <div class="input-group mt-3">
        <input type="text" id="userInput" class="form-control" placeholder="Type your question...">
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            const chat = document.getElementById("chat-box");
            chat.innerHTML += `<div class="msg user-msg">${text}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();

                if (data.reply) {
                    chat.innerHTML += `<div class="msg ai-msg">${data.reply}</div>`;
                } else {
                    chat.innerHTML += `<div class="msg ai-msg text-danger">Error: ${data.error || "Something went wrong"}</div>`;
                }
            } catch (err) {
                chat.innerHTML += `<div class="msg ai-msg text-danger">Failed to connect to AI. Check console for details.</div>`;
                console.error(err);
            }

            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById("userInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
