<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManageIt - AI Business Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(to bottom, #fdf6e3, #f5e8c7); }
        .chat-box { height: 60vh; overflow-y: auto; background: white; border-radius: 12px; padding: 15px; }
        .user-bubble { background: #8d5524; color: white; border-radius: 18px 18px 0 18px; padding: 10px 15px; margin: 8px 0; max-width: 80%; float: right; }
        .ai-bubble { background: #f5e8c7; color: #5d4037; border-radius: 18px 18px 18px 0; padding: 10px 15px; margin: 8px 0; max-width: 80%; float: left; }
    </style>
</head>
<body class="container py-5">
    <h2 class="text-center mb-4">🤖 AI Business Assistant</h2>
    <div class="chat-box mb-3" id="chat-box">
        <div class="ai-bubble">Hi! I'm your AI helper. Ask me anything about your printing business, tasks, orders, or growth ideas 😊</div>
    </div>

    <div class="input-group">
        <input type="text" id="user-input" class="form-control" placeholder="Type your question...">
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById("user-input");
            const message = input.value.trim();
            if (!message) return;

            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<div class="user-bubble">${message}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            input.value = "";

            fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: message})
            })
            .then(response => response.json())
            .then(data => {
                if (data.reply) {
                    chatBox.innerHTML += `<div class="ai-bubble">${data.reply}</div>`;
                } else if (data.error) {
                    chatBox.innerHTML += `<div class="ai-bubble text-danger">Error: ${data.error}</div>`;
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(err => {
                chatBox.innerHTML += `<div class="ai-bubble text-danger">Error: Could not connect to AI</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // Send on Enter key
        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
