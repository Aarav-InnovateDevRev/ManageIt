<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - ManageIt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body{background:#fdf6e3;}</style>
</head>
<body>
<nav class="navbar navbar-dark bg-brown"><div class="container"><a class="navbar-brand" href="/dashboard">← Dashboard</a></div></nav>
<div class="container py-5">
    <h2><i class="fas fa-tasks"></i> My Tasks</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for cat,msg in messages %}<div class="alert alert-{{cat}}">{{msg}}</div>{% endfor %}{% endif %}{% endwith %}
    <form method="POST" class="input-group mb-4">
        <input type="text" name="task" class="form-control form-control-lg" placeholder="What needs to be done?" required>
        <button class="btn btn-primary"><i class="fas fa-plus"></i></button>
    </form>
    <div class="row">
        {% for t in tasks %}
        <div class="col-md-6 mb-3"><div class="card p-3"><i class="fas fa-check-circle text-success"></i> {{t.task}}</div></div>
        {% endfor %}
    </div>
</div>
</body>
</html>
