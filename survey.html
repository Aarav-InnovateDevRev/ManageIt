<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManageIt - Business Survey</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h2 class="text-center mb-4">Business Health Survey</h2>
    <p class="text-center text-muted">Answer a few questions. AI will analyse and give tips.</p>

    <form method="POST">
        <div class="mb-3">
            <label>How many orders do you get per week on average?</label>
            <input type="text" name="orders_per_week" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>What is your biggest challenge right now?</label>
            <input type="text" name="biggest_challenge" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>How satisfied are you with your current profit? (1-10)</label>
            <input type="number" name="profit_satisfaction" class="form-control" min="1" max="10" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Submit Survey</button>
    </form>
</body>
</html>
